name: Daily Stock WhatsApp Alert

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  run-alert:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install twilio requests feedparser

    - name: Execute Script
      run: python stock_alert.py
